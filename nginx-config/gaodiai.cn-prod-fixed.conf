# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name gaodiai.cn;

    # 允许 Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主配置（优化版，解决开发者工具 ERR_CONNECTION_RESET 问题）
server {
    listen 443 ssl http2;
    server_name gaodiai.cn;

    # SSL 证书配置
    ssl_certificate /etc/letsencrypt/live/gaodiai.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gaodiai.cn/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 关键修复：增大缓冲区和超时时间
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # 小程序专用 API 代理
    location /api/ {
        # 代理到后端服务
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 关键配置：解决开发者工具 ERR_CONNECTION_RESET 问题
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 关键修复：不覆盖 Connection 头
        proxy_set_header Connection "";

        # 关键修复：增大超时时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 关键修复：增大缓冲区
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 32 64k;
        proxy_busy_buffers_size 128k;

        # 关键修复：关闭 WebSocket 升级（小程序不需要）
        proxy_set_header Upgrade "";
        proxy_set_header Connection "close";

        # CORS 配置（小程序需要）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-WX-OpenId, X-WX-Token" always;
        add_header Access-Control-Max-Age 86400;

        # 处理 OPTIONS 预检请求
        if ($request_method = OPTIONS) {
            return 204;
        }

        # 错误处理
        proxy_intercept_errors off;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 日志配置
    access_log /var/log/nginx/gaodiai-access.log;
    error_log /var/log/nginx/gaodiai-error.log debug;

    # 限制请求速率（防止滥用）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req zone=api_limit burst=50 nodelay;
}
